    <div class="container mt-3">
        <form class="row g-3">
            <h3>Cadastrando Produtos</h3>

            <div class="col-md-8 col-ms-12">
                <div class="form-floating">
                    <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome do produto" required>
                    <label for="nome">Nome do Produto</label>
                </div>
            </div>

            <div class="col-md-4 col-ms-12">
                <div class="form-floating">
                    <input type="text" name="codigo" id="codigo" class="form-control" placeholder="Código do produto" required>
                    <label for="codigo">Código do produto</label>
                </div>
            </div>

            <div class="col-md-12 col-ms-12">
                <div class="form-floating">
                    <input type="text" name="funcionario_responsavel" id="funcionario_responsavel" class="form-control" placeholder="Funcionário Responsavel" required>
                    <label for="funcionario_responsavel">Funcionário Responsavel</label>
                </div>
            </div>

            <div class="col-md-4 col-ms-12">
                <div class="form-floating">
                    <input type="number" step="0.50" name="valor" id="valor" class="form-control" placeholder="Valor do Produto">
                    <label for="valor">Valor do Produto</label>
                </div>
            </div>

            <div class="col-md-4 col-ms-12">
                <div class="form-floating">
                    <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="Quantidade" required>
                    <label for="quantidade">Quantidade</label>
                </div>
            </div>

            <div class="col-md-4 col-ms-12">
                <div class="form-floating">
                    <select name="categoria" class="form-select">
                        <option value="" selected disabled>Selecione</option>
                        <option value="roupa_acessorio">Roupa/Acessorio</option>
                        <option value="cosmetico">Cosmético</option>
                        <option value="alimento">Alimento</option>
                    </select>
                    <label for="categoria">Categoria</label>
                </div>
            </div>

            <div class="col-md-8 col-sm-12"> 
                <label class="form-label d-block">Fabricado em:</label>
                <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="sp" class="form-check-input">
                    <label for="sp" class="form-check-label">São Paulo</label>
                </div>

                <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="rj" class="form-check-input">
                    <label for="rj" class="form-check-label">Rio de Janeiro</label>
                </div>

                <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="mg" class="form-check-input">
                    <label for="mg" class="form-check-label">Minas Gerais</label>
                </div>
            </div>

            <div class="col-md-4 col-ms-12 mt-4">
                <div class="form-floating">
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <button type="reset" class="btn btn-warning">Limpar</button>
                    <button type="button" class="btn btn-danger">Cancelar</button>
                </div>
            </div>


                </div>
            </div>

            

        

            

        </form>
